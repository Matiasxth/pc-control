name: Bug report
description: Report a reproducible bug in pc-control
labels: [bug]
body:
  - type: input
    id: command
    attributes:
      label: Command you ran
      description: The exact `python -m pc_control ...` or `pc-control ...` invocation.
      placeholder: python -m pc_control screen shot --window "Notepad"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened
      description: Paste stdout, stderr, and any traceback.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: pc-control version
      description: "`python -c \"import pc_control; print(pc_control.__version__)\"`"
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: "`python --version`"
      placeholder: Python 3.12.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: textarea
    id: deps
    attributes:
      label: Relevant optional deps
      description: If the bug is in `browser`, `ocr`, `desktop`, or `vision`, paste `pip show playwright` / `pywinauto` / `winsdk` / `opencv-python` as applicable.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I can reproduce this on a fresh install of pc-control.
          required: false
        - label: I searched existing issues and didn't find a duplicate.
          required: true
