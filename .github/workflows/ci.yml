name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Ruff check
        run: ruff check pc_control examples tests

  compile:
    name: Compile (py-syntax)
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Syntax check (compileall)
        run: python -m compileall -q pc_control

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: CLI help smoke test
        shell: bash
        run: python -m pc_control --help > /dev/null

      - name: Run pytest
        run: pytest tests/ -v
