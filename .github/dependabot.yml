version: 2

updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Santiago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Bundle patch + minor bumps so we don't get one PR per dep every week.
      runtime-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        dependency-type: production
      dev-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        dependency-type: development

  # Pinned actions in .github/workflows/
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Santiago
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
